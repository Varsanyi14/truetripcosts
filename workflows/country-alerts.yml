name: Country cost alerts

# Fires when a country's cost data changes on main, and emails only that
# country's subscribers (the country:<slug> tag). It reads the deliberate
# costUpdate field, not checkedISO, so routine re-checks never trigger an alert.
on:
  push:
    branches: [main]
    paths:
      - 'src/data/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: country-alerts
  cancel-in-progress: false

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history, so we can read the previous commit
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Send country cost alerts
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_SEND_KEY }}
          BEFORE_SHA: ${{ github.event.before }}
          ALERTS_DRY_RUN: ${{ vars.ALERTS_DRY_RUN }}
        run: node scripts/send-country-alerts.mjs
