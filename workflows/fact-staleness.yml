name: Fact staleness check

# Advisory only. Runs the fact staleness scanner on a schedule and prints which
# high-churn facts may be due for another look. It has no side effects: it sends
# no email and, unless the FACT_STALENESS_STRICT repo variable is set to true, it
# always exits 0, so it never blocks anything. Read the run log for findings.
on:
  schedule:
    - cron: '0 7 * * 1'      # every Monday at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fact-staleness
  cancel-in-progress: false

jobs:
  staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check fact staleness
        env:
          FACT_STALENESS_STRICT: ${{ vars.FACT_STALENESS_STRICT }}
        run: node scripts/check-fact-staleness.mjs
